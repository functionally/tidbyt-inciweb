# inciweb — podman kube spec for the wildfire-near-me push daemon.
#
# Start the pod:   podman kube play inciweb.yaml
# Stop the pod:    podman kube down inciweb.yaml
# Replace running: podman kube play --replace inciweb.yaml
# Container logs:  podman logs -f inciweb-tidbyt
#
# Image is built by scripts/build-container.sh, which bakes config.yaml in
# at build time.

apiVersion: v1
kind: Pod
metadata:
  name: inciweb
  labels:
    app: inciweb
spec:
  restartPolicy: Always
  containers:
    - name: tidbyt
      image: localhost/inciweb:latest
      env:
        - name: PUSH_INTERVAL_S
          value: "600"
      securityContext:
        readOnlyRootFilesystem: false
